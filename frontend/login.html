<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Salomón Sport</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="login-body">

  <main class="login-container">
  
    <section class="login-box">

      <div class="login-card">

        <header class="login-header">
          <div class="logo-badge">
            <img src="assets/logo.png" alt="Logo Salomón Sport" class="logo-login">
          </div>
          <p class="login-subtitle">Sistema de Inventario Deportivo</p>
        </header>

        <!-- Tabs Navigation -->
        <div class="login-tabs">
          <button class="tab-btn active" data-tab="login">Iniciar Sesión</button>
          <button class="tab-btn" data-tab="signup">Crear Cuenta</button>
          <button class="tab-btn" data-tab="recover">Recuperar Contraseña</button>
        </div>

        <!-- Login Tab -->
        <div class="tab-content active" id="login-tab">
          <form class="login-form">
            <div class="form-group">
              <label for="email-login">Correo Electrónico</label>
              <input type="email" id="email-login" placeholder="admin@deportes.com" required>
            </div>

            <div class="form-group">
              <label for="password-login">Contraseña</label>
              <input type="password" id="password-login" placeholder="admin123" required>
            </div>

            <button type="submit" class="btn-submit">Iniciar Sesión</button>
            <p class="login-error" aria-live="polite"></p>
          </form>

          <div class="login-credentials">
            <p>Credenciales de prueba:</p>
            <p><strong>Admin:</strong> admin@deportes.com / admin123</p>
          </div>
        </div>

        <!-- Signup Tab -->
        <div class="tab-content" id="signup-tab">
          <form class="login-form">
            <div class="form-group">
              <label for="name-signup">Nombre Completo</label>
              <input type="text" id="name-signup" placeholder="Tu nombre" required>
            </div>

            <div class="form-group">
              <label for="email-signup">Correo Electrónico</label>
              <input type="email" id="email-signup" placeholder="tu@email.com" required>
            </div>

            <div class="form-group">
              <label for="password-signup">Contraseña</label>
              <input type="password" id="password-signup" placeholder="Mínimo 8 caracteres" required>
            </div>

            <div class="form-group">
              <label for="confirm-password">Confirmar Contraseña</label>
              <input type="password" id="confirm-password" placeholder="Confirma tu contraseña" required>
            </div>

            <button type="submit" class="btn-submit">Crear Cuenta</button>
            <p class="login-error" aria-live="polite"></p>
          </form>
        </div>

        <!-- Recover Password Tab -->
        <div class="tab-content" id="recover-tab">
          <form class="login-form">
            <div class="form-group">
              <label for="new-password">Nueva Contraseña</label>
              <input type="password" id="new-password" placeholder="Mínimo 8 caracteres" required>
            </div>

            <div class="form-group">
              <label for="confirm-new-password">Confirmar Nueva Contraseña</label>
              <input type="password" id="confirm-new-password" placeholder="Confirma tu nueva contraseña" required>
            </div>

            <button type="submit" class="btn-submit">Cambiar Contraseña</button>
            <p class="login-error" aria-live="polite"></p>
          </form>
        </div>

      </div>

    </section>

  </main>

  <script>
    // Tabs Functionality
    const tabBtns = document.querySelectorAll('.tab-btn');
    const tabContents = document.querySelectorAll('.tab-content');

    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        // Remove active class from all buttons and contents
        tabBtns.forEach(b => b.classList.remove('active'));
        tabContents.forEach(c => c.classList.remove('active'));

        // Add active class to clicked button and corresponding content
        btn.classList.add('active');
        const tabId = btn.getAttribute('data-tab');
        document.getElementById(tabId + '-tab').classList.add('active');
      });
    });

    // LOGIN TAB
    const loginForm = document.querySelector('#login-tab .login-form');
    const loginError = document.querySelector('#login-tab .login-error');

    loginForm.addEventListener('submit', function (event) {
      event.preventDefault();

      const email = document.getElementById('email-login').value.trim();
      const password = document.getElementById('password-login').value.trim();

      const validEmail = 'admin@deportes.com';
      const validPassword = 'admin123';

      if (email === validEmail && password === validPassword) {
        window.location.href = 'index.html';
      } else {
        loginError.textContent = 'Credenciales incorrectas. Usa Admin: admin@deportes.com / admin123';
        loginError.style.color = '#f87171';
      }
    });

    // SIGNUP TAB
    const signupForm = document.querySelector('#signup-tab .login-form');
    const signupError = document.querySelector('#signup-tab .login-error');

    signupForm.addEventListener('submit', function (event) {
      event.preventDefault();

      const name = document.getElementById('name-signup').value.trim();
      const email = document.getElementById('email-signup').value.trim();
      const password = document.getElementById('password-signup').value.trim();
      const confirmPassword = document.getElementById('confirm-password').value.trim();

      if (password.length < 8) {
        signupError.textContent = 'La contraseña debe tener mínimo 8 caracteres';
        signupError.style.color = '#f87171';
        return;
      }

      if (password !== confirmPassword) {
        signupError.textContent = 'Las contraseñas no coinciden';
        signupError.style.color = '#f87171';
        return;
      }

      signupError.textContent = 'Cuenta creada exitosamente. Por favor inicia sesión.';
      signupError.style.color = '#34d399';
      
      setTimeout(() => {
        document.querySelector('[data-tab="login"]').click();
        document.getElementById('email-login').value = email;
        document.getElementById('password-login').focus();
      }, 1500);
    });

    // RECOVER PASSWORD TAB
    const recoverForm = document.querySelector('#recover-tab .login-form');
    const recoverError = document.querySelector('#recover-tab .login-error');

    recoverForm.addEventListener('submit', function (event) {
      event.preventDefault();

      const newPassword = document.getElementById('new-password').value.trim();
      const confirmNewPassword = document.getElementById('confirm-new-password').value.trim();

      if (newPassword.length < 8) {
        recoverError.textContent = 'La contraseña debe tener mínimo 8 caracteres';
        recoverError.style.color = '#f87171';
        return;
      }

      if (newPassword !== confirmNewPassword) {
        recoverError.textContent = 'Las contraseñas no coinciden';
        recoverError.style.color = '#f87171';
        return;
      }

      recoverError.textContent = 'Contraseña cambiada exitosamente. Redirigiendo...';
      recoverError.style.color = '#34d399';

      setTimeout(() => {
        document.querySelector('[data-tab="login"]').click();
      }, 1500);
    });
  </script>
</body>
</html>
